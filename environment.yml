name: equipharm
channels:
  - conda-forge
dependencies:
  - ase
  - ipykernel
  - jupyterlab
  - matplotlib
  - h5py
  - numpy[version='<2']
  - pandas
  - pip
  - python=3.10
  - rdkit
  - scikit-learn
  - scipy
  - tensorboard
  - tqdm
  - pip:
      # PyTorch with CUDA 12.8 for Blackwell GPUs
      - --index-url=https://download.pytorch.org/whl/cu128
      - torch==2.7.0
      - torchvision==0.22.0
      - torchaudio==2.7.0

      # return to normal PyPI for the rest
      - --extra-index-url=https://pypi.org/simple

      # PyTorch Geometric
      - torch-geometric
      # Compiled PyG operators used by the authors' Equiformer implementation.
      # Wheels must match torch 2.7.0 and CUDA 12.8.
      - --find-links=https://data.pyg.org/whl/torch-2.7.0+cu128.html
      - torch-scatter
      - torch-cluster

      # Model and CDPL/CDPKit libraries
      # The original Equiformer source was written against this e3nn API.
      - e3nn==0.4.4
      - timm==0.4.12
      - equiformer-pytorch
      - se3-transformer-pytorch
      - dive-into-graphs
      - CDPKit
